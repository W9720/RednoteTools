name: 打包无根越狱deb
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装完整Theos环境
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          curl -fsSL https://raw.githubusercontent.com/theos/sdks/master/setup.sh | bash
          brew install ldid
          chmod +x ~/theos/bin/*

      - name: 编译打包（正式版，无debug）
        run: |
          make clean
          make package FINALPACKAGE=1 ARCHS=arm64 THEOS_PACKAGE_SCHEME=rootless

      - name: 上传deb文件
        uses: actions/upload-artifact@v4
        with:
          name: Deb-Package
          path: packages/*.deb
